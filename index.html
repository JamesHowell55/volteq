<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Primary: adaptive SVG favicon — switches black/white via an embedded
         prefers-color-scheme media query, which browsers honour reliably
         (unlike the media attribute on <link rel="icon"> itself, which several
         browsers, including Firefox, do not evaluate). -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Fallback for the rare browser that can't render an SVG favicon at all. -->
    <link rel="alternate icon" type="image/png" href="/favicon-light.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Volteq — Engineering Calculators</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
