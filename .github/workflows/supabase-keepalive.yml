name: Supabase keep-alive

# Free-tier Supabase projects are paused after 7 days of inactivity. This job
# makes a lightweight authenticated request to the project's Auth (GoTrue) health
# endpoint every 2 days so the project keeps counting as active and is never
# auto-paused. It also runs on demand from the Actions tab (workflow_dispatch).
#
# The values below are PUBLIC: the project URL appears in every request and the
# `sb_publishable_...` key is the anon/publishable key that already ships in the
# volteq.io browser bundle — so keeping them here exposes nothing new. If you ever
# rotate the publishable key or move the project, update the two lines below.
#
# Note: GitHub disables scheduled workflows after 60 days with no repository
# activity (commits) — not a concern for an actively developed repo, but you can
# always re-enable it from the Actions tab, or trigger a manual run.

on:
  schedule:
    - cron: '23 5 */2 * *' # every 2 days at 05:23 UTC — comfortably inside the 7-day window
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (Auth health)
        run: |
          SUPABASE_URL="https://hxqnhhbbynsursaikyds.supabase.co"
          SUPABASE_ANON_KEY="sb_publishable_7L6oroZUHrY-A_wgEbITCw_ibadgVGz"
          echo "Pinging ${SUPABASE_URL}/auth/v1/health ..."
          code=$(curl -s -o /tmp/body.txt -w '%{http_code}' \
            "${SUPABASE_URL}/auth/v1/health" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            --max-time 30 --retry 3 --retry-delay 10 --retry-all-errors)
          echo "HTTP ${code}"
          cat /tmp/body.txt || true
          echo
          if [ "${code}" = "200" ]; then
            echo "✅ Supabase project is awake — inactivity timer reset."
          else
            echo "::error::Unexpected HTTP ${code} — the project may be paused, or the publishable key was rotated. Check the Supabase dashboard."
            exit 1
          fi
